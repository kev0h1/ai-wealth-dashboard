<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle area fill beneath the trend line -->
  <path
    d="M 72 408 Q 176 368 256 294 Q 336 222 440 148 L 440 448 L 72 448 Z"
    fill="rgba(255,255,255,0.07)"
  />

  <!-- Trend line: smooth bezier from bottom-left to top-right -->
  <path
    d="M 72 408 Q 176 368 256 294 Q 336 222 440 148"
    stroke="white"
    stroke-width="26"
    stroke-linecap="round"
    fill="none"
  />

  <!-- Dots along the line -->
  <circle cx="72"  cy="408" r="16" fill="white" opacity="0.4"/>
  <circle cx="256" cy="294" r="18" fill="white" opacity="0.7"/>
  <circle cx="440" cy="148" r="22" fill="white"/>

  <!-- 4-pointed sparkle star (amber) floating above end dot -->
  <!-- Center (382, 82), outer r=36, inner r=14 -->
  <path d="
    M 382 46
    L 392 68
    L 418 78
    L 392 88
    L 382 110
    L 372 88
    L 346 78
    L 372 68
    Z"
    fill="#fbbf24"
  />

  <!-- Tiny accent dots for sparkle feel -->
  <circle cx="432" cy="92"  r="6" fill="rgba(251,191,36,0.55)"/>
  <circle cx="340" cy="60"  r="4" fill="rgba(251,191,36,0.40)"/>
  <circle cx="456" cy="170" r="4" fill="rgba(255,255,255,0.30)"/>
</svg>
