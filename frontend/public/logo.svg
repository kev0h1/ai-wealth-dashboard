<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Clip everything to the rounded square -->
    <clipPath id="round">
      <rect width="512" height="512" rx="112"/>
    </clipPath>
    <!-- Subtle purple bloom in the upper centre -->
    <radialGradient id="bloom" cx="50%" cy="38%" r="52%">
      <stop offset="0%"   stop-color="#3b0e8c" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#080810" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <g clip-path="url(#round)">
    <!-- Background: near-black with slight purple tint -->
    <rect width="512" height="512" fill="#09090f"/>
    <!-- Purple bloom -->
    <rect width="512" height="512" fill="url(#bloom)"/>

    <!-- ── Auriq floating diamond motifs ── -->
    <!-- Large diamond — top right -->
    <rect x="372" y="62" width="56" height="56" rx="6"
          fill="#7c3aed"
          transform="rotate(45 400 90)"/>

    <!-- Medium diamond — bottom left -->
    <rect x="75" y="354" width="34" height="34" rx="4"
          fill="#7c3aed" opacity="0.45"
          transform="rotate(45 92 371)"/>

    <!-- Small diamond — right edge mid -->
    <rect x="429" y="238" width="22" height="22" rx="3"
          fill="#7c3aed" opacity="0.28"
          transform="rotate(45 440 249)"/>

    <!-- ── Bold W letterform ── -->
    <polyline
      points="82,146 168,386 256,206 344,386 430,146"
      stroke="white"
      stroke-width="56"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
    />

    <!-- ── Green live-indicator dot (Auriq "Taking on projects" motif) ── -->
    <!-- Outer pulse ring -->
    <circle cx="421" cy="421" r="20" fill="#22c55e" opacity="0.20"/>
    <!-- Solid dot -->
    <circle cx="421" cy="421" r="12" fill="#22c55e"/>
  </g>
</svg>
