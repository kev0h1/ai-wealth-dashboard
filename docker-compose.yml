services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
    expose:
      - "8000"

  sync_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
    command: ["python", "-m", "arq", "app.workers.sync_worker.WorkerSettings"]

  ai_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
    command: ["python", "-m", "arq", "app.workers.ai_worker.WorkerSettings"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      BACKEND_URL: http://api:8000
    expose:
      - "3000"
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - frontend

volumes:
  redis_data:
